, captions\n     F37Hooj 600 \u2192 alternate display face for editorial / marketing surfaces */\n  --font-display: 'PPEiko', Georgia, serif;\n  --font-label:   'PPRadioGrotesk', Arial, sans-serif;\n  --font-body:    'Arial', Helvetica, sans-serif;\n  --font-brand:   'F37Hooj', 'PPEiko', Georgia, serif;\n\n  /* ---------- Spacing scale ---------- */\n  --s-1: 4px;\n  --s-2: 8px;\n  --s-3: 12px;\n  --s-4: 16px;\n  --s-5: 24px;\n  --s-6: 32px;\n  --s-7: 48px;\n  --s-8: 64px;\n  --s-9: 96px;\n\n  /* ---------- Radii (Cape is conservative \u2014 radii are small) ---------- */\n  --radius-sm: 2px;\n  --radius-md: 3px;\n  --radius-lg: 6px;\n  --radius-pill: 999px;\n\n  /* ---------- Shadow system (used sparingly) ---------- */\n  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);\n  --shadow-md: 0 2px 12px rgba(0,0,0,0.08);\n  --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);\n\n  /* ---------- Motion ---------- */\n  --ease:        cubic-bezier(.2,.7,.2,1);\n  --duration-1:  120ms;\n  --duration-2:  200ms;\n  --duration-3:  300ms;\n}\n\n/* ============================================================\n   Dark themes \u2014 semantic tokens flip for dark-red / -purple / -green\n   ============================================================ */\n.theme-dark-red {\n  --bg: var(--deep-red);    --bg-alt: #5e1416;  --surface: rgba(255,255,255,0.05);\n  --fg: var(--white);       --fg-2: rgba(255,255,255,0.78); --fg-muted: rgba(255,255,255,0.55);\n  --border: rgba(255,255,255,0.14); --border-soft: rgba(255,255,255,0.08);\n  --accent: var(--white);   --accent-fg: var(--deep-red);\n}\n.theme-dark-purple {\n  --bg: var(--purple);      --bg-alt: var(--deep-purple); --surface: rgba(255,255,255,0.05);\n  --fg: var(--white);       --fg-2: rgba(255,255,255,0.78); --fg-muted: rgba(255,255,255,0.55);\n  --border: rgba(255,255,255,0.14); --border-soft: rgba(255,255,255,0.08);\n  --accent: var(--white);   --accent-fg: var(--purple);\n}\n.theme-dark-green {\n  --bg: var(--green);       --bg-alt: var(--deep-green); --surface: rgba(255,255,255,0.05);\n  --fg: var(--white);       --fg-2: rgba(255,255,255,0.78); --fg-muted: rgba(255,255,255,0.55);\n  --border: rgba(255,255,255,0.14); --border-soft: rgba(255,255,255,0.08);\n  --accent: var(--white);   --accent-fg: var(--green);\n}\n\n/* ============================================================\n   Base type\n   ============================================================ */\nhtml { font-size: 16px; }\nbody {\n  font-family: var(--font-body);\n  color: var(--fg);\n  background: var(--bg);\n  line-height: 1.55;\n  -webkit-font-smoothing: antialiased;\n}\n\n/* Display headlines \u2014 PPEiko 300 */\n.headline-xl, h1.display {\n  font-family: var(--font-display);\n  font-weight: 300;\n  font-size: clamp(3rem, 6.5vw, 4.8rem);\n  letter-spacing: -0.03em;\n  line-height: 1.02;\n  color: var(--fg);\n}\n.headline, h1, h2.display {\n  font-family: var(--font-display);\n  font-weight: 300;\n  font-size: clamp(1.8rem, 4vw, 3.2rem);\n  letter-spacing: -0.02em;\n  line-height: 1.08;\n  color: var(--fg);\n}\nh2 {\n  font-family: var(--font-display);\n  font-weight: 300;\n  font-size: clamp(1.4rem, 2.6vw, 2.2rem);\n  letter-spacing: -0.015em;\n  line-height: 1.15;\n}\nh3 {\n  font-family: var(--font-display);\n  font-weight: 300;\n  font-size: 1.4rem;\n  letter-spacing: -0.01em;\n  line-height: 1.22;\n}\n\n/* Labels / eyebrows \u2014 PPRadioGrotesk 700 uppercase */\n.label, .eyebrow {\n  font-family: var(--font-label);\n  font-weight: 700;\n  font-size: 0.65rem;\n  letter-spacing: 0.16em;\n  text-transform: uppercase;\n  color: var(--fg-2);\n}\n.stat-label {\n  font-family: var(--font-label);\n  font-weight: 700;\n  font-size: 0.55rem;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--fg-2);\n}\n\n/* Subtitle \u2014 Arial, NOT italic */\n.subtitle {\n  font-family: var(--font-body);\n  font-weight: 400;\n  font-size: clamp(1rem, 2vw, 1.4rem);\n  line-height: 1.4;\n  color: var(--fg-2);\n}\n\n/* Body */\np, .body-text {\n  font-family: var(--font-body);\n  font-size: 0.85rem;\n  line-height: 1.62;\n  color: var(--fg);\n}\n.body-text-lg {\n  font-family: var(--font-body);\n  font-size: 1rem;\n  line-height: 1.65;\n}\n\n/* Stats */\n.stat {\n  font-family: var(--font-display);\n  font-weight: 300;\n  font-size: clamp(2.5rem, 6vw, 5rem);\n  letter-spacing: -0.02em;\n  line-height: 1;\n}\n\n/* Pull quote \u2014 PPEiko italic */\n.quote, blockquote {\n  font-family: var(--font-display);\n  font-weight: 300;\n  font-style: italic;\n  font-size: clamp(1.6rem, 3.5vw, 2.8rem);\n  line-height: 1.3;\n  color: var(--fg);\n}\n\n/* Source / citation \u2014 30% opacity floor */\n.cite, cite {\n  font-family: var(--font-body);\n  font-size: 0.62rem;\n  opacity: 0.3;\n  font-style: normal;\n}\n\n/* Italic emphasis inside headlines \u2014 PPEiko italic, do NOT resize or recolor */\n.headline em, .headline-xl em, h1 em, h2 em {\n  font-style: italic;\n  font-weight: 300;\n  font-size: inherit;\n  color: inherit;\n}\n\n/* Short red horizontal rule \u2014 section marker */\n.rule-red {\n  display: block;\n  width: 40px;\n  height: 2px;\n  background: var(--capital-red);\n  margin-bottom: 1rem;\n  border: 0;\n}\n<\u002Fstyle>\n<style>\n/* ==========================================================================\n   Cape Capital design tokens\n   ========================================================================== */\n:root {\n  --beige-100: #F5F2E6;\n  --beige-300: #EFECDD;\n  --beige-400: #E4DFC8;\n  --white: #FFFFFF;\n  --black: #000000;\n  --deep-red: #4A090A;\n  --purple: #4A090A;\n  --green: #4A090A;\n  --capital-red: #831011;\n  --red-100: #FAF0F0;\n  --orange: #AD2A2B;\n  --moss: #C85657;\n  --light-purple: #C85657;\n  --matcha: #C8CBD1;\n  --sky: #C85657;\n  --deep-blue: #4C4F56;\n  --grey-800: #4C4F56;\n  --grey-400: #ADB2BA;\n  --grey-300: #C8CBD1;\n  --grey-200: #DCDFE5;\n  --grey-100: #EEF0F4;\n\n  --font-display: \"PPEiko\", Georgia, serif;\n  --font-label: \"PPRadioGrotesk\", Arial, sans-serif;\n  --font-body: Arial, sans-serif;\n\n  --slide-w: 1280px;\n  --slide-h: 720px;\n}\n\n/* ==========================================================================\n   Reset + body\n   ========================================================================== */\n* { box-sizing: border-box; margin: 0; padding: 0; }\nhtml, body {\n  height: 100%;\n  background: #FAFBFE;\n  color: var(--black);\n  font-family: var(--font-body);\n  overflow: hidden;\n}\nbody.presenting { cursor: none; }\n\n/* ==========================================================================\n   Deck + slide\n   ========================================================================== */\n.deck {\n  position: fixed;\n  inset: 0;\n  display: grid;\n  place-items: center;\n}\n.slide {\n  position: absolute;\n  width: var(--slide-w);\n  height: var(--slide-h);\n  background: var(--beige-100);\n  transform-origin: center center;\n  opacity: 0;\n  visibility: hidden;\n  transition: opacity 200ms ease;\n  overflow: hidden;\n  padding: 28px 44px 56px;\n  display: flex;\n  flex-direction: column;\n}\n.slide.active {\n  opacity: 1;\n  visibility: visible;\n}\n\n/* ==========================================================================\n   Chrome\n   ========================================================================== */\n.progress {\n  position: fixed;\n  left: 0; bottom: 0;\n  height: 2px;\n  background: var(--capital-red);\n  width: 0;\n  transition: width 200ms ease;\n  z-index: 100;\n}\n.counter {\n  display: none;\n}\n.hint {\n  position: fixed;\n  left: 18px; bottom: 8px;\n  font-family: var(--font-label);\n  font-size: 10px;\n  color: var(--grey-400);\n  letter-spacing: 0.12em;\n  z-index: 100;\n}\nbody.presenting .counter,\nbody.presenting .progress,\nbody.presenting .hint { opacity: 0.4; }\n\n/* ==========================================================================\n   Slide header / title / footer\n   ========================================================================== */\n.header-top {\n  display: flex;\n  justify-content: space-between;\n  align-items: baseline;\n}\n.section-label {\n  font-family: var(--font-label);\n  font-weight: 400;\n  text-transform: uppercase;\n  letter-spacing: 0.18em;\n  font-size: 10px;\n  color: var(--capital-red);\n}\n.theme-marker {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  font-family: var(--font-label);\n  font-weight: 400;\n  text-transform: uppercase;\n  letter-spacing: 0.1em;\n  font-size: 10px;\n  color: var(--grey-800);\n}\n.theme-marker .tm-dot {\n  width: 9px; height: 9px; border-radius: 50%;\n  display: inline-block;\n}\n.theme-marker .tm-weight {\n  font-family: var(--font-display);\n  font-weight: 400;\n  font-size: 15px;\n  letter-spacing: 0;\n  color: var(--deep-red);\n  margin-left: 2px;\n}\n.theme-marker .tm-sep { color: var(--grey-300); margin: 0 2px; }\n.theme-marker .tm-idx {\n  font-family: var(--font-label);\n  font-weight: 400;\n  font-size: 9px;\n  letter-spacing: 0.08em;\n  color: var(--grey-400);\n  background: var(--grey-100);\n  border-radius: 3px;\n  padding: 2px 6px;\n}\n.date-label {\n  font-family: var(--font-label);\n  font-weight: 500;\n  text-transform: uppercase;\n  letter-spacing: 0.16em;\n  font-size: 10px;\n  color: var(--grey-800);\n}\n.rule-red {\n  height: 2px;\n  background: var(--capital-red);\n  width: 56px;\n  margin: 8px 0 10px 0;\n}\n.title {\n  font-family: var(--font-display);\n  font-weight: 400;\n  font-size: 34px;\n  line-height: 1.08;\n  color: var(--deep-red);\n  letter-spacing: -0.01em;\n}\n.subtitle {\n  font-family: var(--font-body);\n  font-size: 12px;\n  color: var(--grey-800);\n  margin-top: 6px;\n  line-height: 1.45;\n  max-width: 1020px;\n}\n.slide-num {\n  position: absolute;\n  right: 24px; bottom: 30px;\n  font-family: var(--font-label);\n  font-size: 11px;\n  color: var(--grey-400);\n  letter-spacing: 0.08em;\n}\n.cite {\n  position: absolute;\n  left: 44px; bottom: 30px;\n  right: 80px;\n  font-family: var(--font-body);\n  font-size: 8.5px;\n  color: var(--grey-400);\n  line-height: 1.35;\n}\n\n/* ==========================================================================\n   Main grid (two-column)\n   ========================================================================== */\n.main-grid {\n  margin-top: 30px;\n  display: grid;\n  grid-template-columns: 1fr 320px;\n  gap: 16px;\n  flex: 1 1 auto;\n  min-height: 0;\n}\n\n/* ==========================================================================\n   Table\n   ========================================================================== */\n.table-wrap {\n  background: var(--white);\n  display: flex;\n  flex-direction: column;\n}\n.tbl {\n  width: 100%;\n  border-collapse: collapse;\n  font-variant-numeric: tabular-nums;\n}\n.tbl thead th {\n  background: var(--beige-400);\n  font-family: var(--font-label);\n  font-size: 9px;\n  font-weight: 400;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--grey-800);\n  padding: 6px 10px;\n  text-align: left;\n  border-bottom: 1px solid var(--beige-400);\n}\n.tbl thead th.num { text-align: right; }\n.tbl tbody td {\n  padding: 6px 10px;\n  font-family: var(--font-body);\n  font-size: 11px;\n  border-bottom: 1px solid var(--grey-100);\n  color: var(--black);\n  vertical-align: middle;\n}\n.tbl tbody td.num { text-align: right; font-weight: 400; }\n.tbl tbody tr:last-child td { border-bottom: none; }\n.strat-name {\n  font-family: var(--font-display);\n  font-size: 14px;\n  color: var(--deep-red);\n  line-height: 1.1;\n  font-weight: 500;\n}\n.strat-desc {\n  font-family: var(--font-body);\n  font-size: 9.5px;\n  color: var(--grey-800);\n  margin-top: 2px;\n  line-height: 1.3;\n}\n.eur-cell { color: var(--capital-red); }\n.weight-cell {\n  color: var(--purple);\n  font-weight: 400;\n  font-size: 12px;\n}\n.tbl tbody tr.total-row td {\n  background: var(--beige-300);\n  border-top: 1.5px solid var(--capital-red);\n  padding-top: 8px;\n  padding-bottom: 8px;\n d); text-decoration-thickness: 1.5px;\n  white-space: nowrap;\n}\n.dead-row .dead-note {\n  font-family: var(--font-body); font-size: 12px; color: var(--grey-800);\n}\n\n/* Print */\n@media print {\n  html, body { background: white; overflow: visible; height: auto; }\n  .deck { position: static; display: block; }\n  .slide {\n    position: relative !important;\n    opacity: 1 !important;\n    visibility: visible !important;\n    transform: none !important;\n    page-break-after: always;\n    margin: 0 auto;\n  }\n  .progress, .counter, .hint { display: none; }\n  @page { size: A4 landscape; margin: 0; }\n}\n\n\n/* ===================== REBRAND OVERRIDES ===================== */\nhtml, body { background:#1a1a1a; overflow:hidden; }\ndeck-stage:not(:defined){ visibility:hidden; }\n:root{\n  --purple:#4A090A; --deep-purple:#3A0708; --purple-300:#C85657; --purple-200:#C85657; --purple-100:#FAF0F0;\n  --moss:#C85657; --orange:#AD2A2B; --deep-blue:#4C4F56; --sky:#C85657; --sky-blue:#C85657;\n  --green:#4A090A; --deep-green:#3A0708; --green-300:#C85657; --green-200:#C8CBD1; --matcha:#C8CBD1; --light-purple:#C85657;\n}\n\n/* deck-stage frame: content slides = native 1280x720 scaled to 1920x1080 */\nsection[data-screen-label]{ position:relative; width:1920px; height:1080px; overflow:hidden; background:#fff; }\nsection[data-screen-label] > .slide{ position:absolute; left:0; top:0; opacity:1 !important; visibility:visible !important; transform:scale(1.5); transform-origin:top left; transition:none; }\n\n.slide{ background:#ffffff; }\n.slide.cover, .slide.section-divider, .slide.back-cover{ background:var(--deep-red); }\n\n/* header order: eyebrow -> headline (no rule above eyebrow) */\n.slide > .header-top{ order:-1; }\n/* remove all rules above content-slide eyebrows; standardise eyebrow */\n.slide:not(.cover):not(.section-divider):not(.back-cover) .rule-red{ display:none !important; }\n.slide:not(.cover):not(.section-divider):not(.back-cover) .header-top{ position:relative; padding-top:0; }\n.section-label{ font-size:12px !important; letter-spacing:0.2em !important; margin:0 0 16px !important; }\n.slide:not(.cover):not(.section-divider):not(.back-cover) h1.title{ margin-bottom:14px; }\n.slide:not(.cover):not(.section-divider):not(.back-cover) .subtitle{ margin-top:0; }\n\n/* NEVER bold */\nstrong, b{ font-weight:400; }\n.subtitle strong{ color:var(--capital-red); }\n.section-label, .divider-part, .cover-eyebrow, .panel-eyebrow, .contrib-eyebrow,\n.tbl thead th, .wl-name, .seg-card-tag, .stat-sub, .hp-eyebrow, .theme-marker, .wl-ret{ font-weight:400 !important; }\n.section-label{ font-size:12px; letter-spacing:0.2em; }\n\n/* headline: PP Eiko near-black on white, never break */\nh1.title{ color:#1a1310; white-space:nowrap; max-width:none; }\n.slide.cover h1.cover-title{ white-space:nowrap; max-width:none; }\n.slide.section-divider h1{ white-space:nowrap; }\n\n/* panels/cards read on white */\n.panel, .table-wrap{ border:1px solid var(--grey-200); }\n.contrib-block{ border:1px solid var(--grey-200); }\n.seg-card{ border:1px solid var(--grey-200); border-top-width:4px; }\n\n/* WHITE text on any solid red box */\n[style*=\"background:var(--deep-red)\"], [style*=\"background: var(--deep-red)\"],\n[style*=\"background:var(--capital-red)\"], [style*=\"background: var(--capital-red)\"],\n[style*=\"background:#4A090A\"], [style*=\"background: #4A090A\"],\n[style*=\"background:var(--deep-red)\"] *, [style*=\"background: var(--deep-red)\"] *,\n[style*=\"background:var(--capital-red)\"] *, [style*=\"background: var(--capital-red)\"] *,\n[style*=\"background:#4A090A\"] *, [style*=\"background: #4A090A\"] *,\n.hero-panel, .hero-panel *, .note-bar, .note-bar *{ color:#fff !important; }\n.hero-panel .hp-eyebrow{ color:rgba(255,255,255,0.85) !important; }\n.hero-panel .hp-big-sub, .hero-panel .hp-k span{ color:rgba(255,255,255,0.6) !important; }\n\n/* drop moss + triangle motif */\n.cover-triangle, .divider-triangle, .cover-bottom-rule, .back-cover .bot ox-sizing:border-box; }\n.tmpl.bg-red{ background:var(--deep-red); color:#fff; }\n.tmpl .pad{ padding:150px 96px 120px; height:100%; box-sizing:border-box; display:flex; flex-direction:column; justify-content:flex-start; }\n.tmpl .rule{ width:56px; height:2px; background:var(--capital-red); margin:0 0 20px; }\n.tmpl.on-dark .rule{ background:#fff; }\n.tmpl .label-lg{ font-family:Arial; font-weight:400; font-size:18px; letter-spacing:0.22em; text-transform:uppercase; color:var(--capital-red); }\n.tmpl.on-dark .label-lg{ color:#fff; }\n.tmpl .display{ font-family:var(--font-display); font-weight:300; letter-spacing:-0.025em; line-height:0.98; margin:0; color:#fff; }\n.tmpl .display.h-lg{ font-size:56px; }\n.tmpl .display em{ font-style:italic; }\n.tmpl .disclaimer-body{ max-width:90ch; }\n.tmpl .disclaimer-body p{ font-family:Arial; font-size:18px; line-height:1.55; color:#fff; margin:0 0 16px; }\n.tmpl .disclaimer-cols{ display:grid; grid-template-columns:1fr 1fr; gap:64px; }\n.tmpl .disclaimer-cols p{ font-family:Arial; font-size:12px; line-height:1.5; color:#fff; margin:0 0 10px; }\n.tmpl .disclaimer-cols strong{ font-weight:400; color:#fff; }\n.tmpl .dl-grid{ display:grid; grid-template-columns:auto 1fr; gap:6px 24px; margin-top:18px; padding-top:14px; border-top:1px solid rgba(255,255,255,0.4); }\n.tmpl .dl-grid .k{ font-family:var(--font-label); font-weight:400; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:#fff; }\n.tmpl .dl-grid .v{ font-family:Arial; font-size:12px; color:rgba(255,255,255,0.85); }\n.tmpl .slide-num{ position:absolute; bottom:48px; right:64px; font-family:var(--font-label); font-weight:400; font-size:20px; letter-spacing:0.22em; color:#fff; }\n/* exact linked-project logo back-cover */\n.tmpl .brand-logo{ position:absolute; left:44px; top:44px; height:26px; width:auto; z-index:20; }\n.tmpl.endcard .brand-logo{ left:50%; top:50%; transform:translate(-50%,-50%); height:52px; }\n.tmpl .wordmark-foot{ position:absolute; bottom:80px; left:0; right:0; text-align:center; font-family:Arial; font-size:16px; letter-spacing:0.6em; text-transform:uppercase; color:#fff; }\n\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n<deck-stage width=\"1920\" height=\"1080\" no-rail=\"\">\n<section data-screen-label=\"29 Appendix - Royalty (what)\">\n    <div class=\"slide\">\n      <img class=\"brand-logo\" src=\"650e1331-48cb-4d5e-a620-f88830959227\" alt=\"Cape Capital\">\n\n    <div class=\"header-top\">\n      <div class=\"section-label\">Usage royalties<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"rule-red\"><\u002Fdiv>\n    <h1 class=\"title\">Royalty income<\u002Fh1>\n    <div class=\"subtitle\"><strong>What it is &amp; why it pays.<\u002Fstrong> Contractual royalties on pharma, music and IP \u2014 income from real-world usage, whatever markets do.<\u002Fdiv>\n\n    <div class=\"two-col\" style=\"grid-template-columns:1.15fr 0.85fr; align-items:start; gap:32px; margin-top:14px;\">\n      <div>\n        <div style=\"font-family:'PPRadioGrotesk',sans-serif; font-weight:400; text-transform:uppercase; letter-spacing:0.12em; font-size:10.5px; color:#ADB2BA; margin-bottom:10px;\">How the income is generated<\u002Fdiv>\n        <svg viewBox=\"0 0 560 190\" style=\"width:100%; height:auto; max-height:150px;\">\n          <!-- usage -> royalty -> investor -->\n          <circle cx=\"80\" cy=\"60\" r=\"42\" fill=\"#FCF1E8\" stroke=\"#AD2A2B\" stroke-width=\"1.3\"><\u002Fcircle>\n          <text x=\"80\" y=\"54\" text-anchor=\"middle\" font-family=\"'PPEiko',serif\" font-size=\"13\" fill=\"#AD2A2B\">Usage<\u002Ftext>\n          <text x=\"80\" y=\"70\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"9\" fill=\"#4C4F56\">streams, scripts,<\u002Ftext>\n          <text x=\"80\" y=\"82\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"9\" fill=\"#4C4F56\">prescriptions<\u002Ftext>\n          <line x1=\"124\" y1=\"60\" x2=\"164\" y2=\"60\" stroke=\"#AD2A2B\" stroke-width=\"2\"><\u002Fline>\n          <polygon points=\"164,54 176,60 164,66\" fill=\"#AD2A2B\"><\u002Fpolygon>\n          <rect x=\"180\" y=\"26\" width=\"150\" height=\"68\" rx=\"6\" fill=\"#FCF1E8\" stroke=\"#AD2A2B\" stroke-width=\"1.3\"><\u002Frect>\n          <text x=\"255\" y=\"52\" text-anchor=\"middle\" font-family=\"'PPEiko',serif\" font-size=\"13\" fill=\"#AD2A2B\">Royalty per use<\u002Ftext>\n          <text x=\"255\" y=\"70\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"9.5\" fill=\"#4C4F56\">contractual % of revenue,<\u002Ftext>\n          <text x=\"255\" y=\"83\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"9.5\" fill=\"#4C4F56\">often inflation-linked<\u002Ftext>\n          <line x1=\"332\" y1=\"60\" x2=\"372\" y2=\"60\" stroke=\"#AD2A2B\" stroke-width=\"2\"><\u002Fline>\n          <polygon points=\"372,54 384,60 372,66\" fill=\"#AD2A2B\"><\u002Fpolygon>\n          <rect x=\"386\" y=\"26\" width=\"164\" height=\"68\" rx=\"6\" fill=\"#831011\"><\u002Frect>\n          <text x=\"468\" y=\"52\" text-anchor=\"middle\" font-family=\"'PPEiko',serif\" font-size=\"13\" fill=\"#fff\">Investor income<\u002Ftext>\n          <text x=\"468\" y=\"70\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"9.5\" fill=\"rgba(255,255,255,0.9)\">steady cash yield,<\u002Ftext>\n          <text x=\"468\" y=\"83\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"9.5\" fill=\"rgba(255,255,255,0.9)\">long catalogue life<\u002Ftext>\n          <text x=\"280\" y=\"126\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"11\" font-style=\"italic\" fill=\"#4C4F56\">Income tracks real-world consumption \u2014 not interest rates or credit spreads.<\u002Ftext>\n          <rect x=\"60\" y=\"146\" width=\"440\" height=\"36\" rx=\"5\" fill=\"#FCF1E8\" stroke=\"#AD2A2B\"><\u002Frect>\n          <text x=\"280\" y=\"169\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"11\" fill=\"#4C4F56\">People stream music and take medicine through recessions \u2014 demand is non-cyclical.<\u002Ftext>\n        <\u002Fsvg>\n        <div style=\"font-family:'PPRadioGrotesk',sans-serif; font-weight:400; text-transform:uppercase; letter-spacing:0.12em; font-size:10px; color:#ADB2BA; margin:12px 0 8px;\">A ~$2 trn opportunity set<sup>1<\u002Fsup> \u2014 far beyond pharma &amp; music<\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:6px 10px; align-items:center;\">\n          <div style=\"font-family:'PPRadioGrotesk',sans-serif; font-weight:400; text-transform:uppercase; letter-spacing:0.06em; font-size:8.5px; color:#C85657; writing-mode:vertical-rl; transform:rotate(180deg); justify-self:center;\">Established<\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:6px;\">\n            <div style=\"background:var(--beige-100); border-radius:5px; padding:6px 9px;\"><div style=\"font-family:Arial; font-size:10px; color:var(--grey-800);\">Brands<\u002Fdiv><div style=\"font-family:'PPEiko',serif; font-size:14px; color:#AD2A2B;\">$320 bn<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:var(--beige-100); border-radius:5px; padding:6px 9px;\"><div style=\"font-family:Arial; font-size:10px; color:var(--grey-800);\">Green metals<\u002Fdiv><div style=\"font-family:'PPEiko',serif; font-size:14px; color:#AD2A2B;\">$260 bn<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:var(--beige-100); border-radius:5px; padding:6px 9px;\"><div style=\"font-family:Arial; font-size:10px; color:var(--grey-800);\">Pharma<\u002Fdiv><div style=\"font-family:'PPEiko',serif; font-size:14px; color:#AD2A2B;\">$185 bn<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:var(--beige-100); border-radius:5px; padding:6px 9px;\"><div style=\"font-family:Arial; font-size:10px; color:var(--grey-800);\">Music<\u002Fdiv><div style=\"font-family:'PPEiko',serif; font-size:14px; color:#AD2A2B;\">$70 bn<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'PPRadioGrotesk',sans-serif; font-weight:400; text-transform:uppercase; letter-spacing:0.06em; font-size:8.5px; color:#4C4F56; writing-mode:vertical-rl; transform:rotate(180deg); justify-self:center;\">Emerging<\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:6px;\">\n            <div style=\"background:var(--beige-100); border-radius:5px; padding:6px 9px;\"><div style=\"font-family:Arial; font-size:10px; color:var(--grey-800);\">Carbon offset<\u002Fdiv><div style=\"font-family:'PPEiko',serif; font-size:14px; color:#AD2A2B;\">$186 bn<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:var(--beige-100); border-radius:5px; padding:6px 9px;\"><div style=\"font-family:Arial; font-size:10px; color:var(--grey-800);\">US natural gas<\u002Fdiv><div style=\"font-family:'PPEiko',serif; font-size:14px; color:#AD2A2B;\">$140 bn<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:var(--beige-100); border-radius:5px; padding:6px 9px;\"><div style=\"font-family:Arial; font-size:10px; color:var(--grey-800);\">Sports<\u002Fdiv><div style=\"font-family:'PPEiko',serif; font-size:14px; color:#AD2A2B;\">$36 bn<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:var(--beige-100); border-radius:5px; padding:6px 9px; border:1px dashed var(--grey-300);\"><div style=\"font-family:Arial; font-size:10px; color:var(--grey-800);\">+ agriculture,<\u002Fdiv><div style=\"font-family:'PPEiko',serif; font-style:italic; font-size:13px; color:#AD2A2B;\">gaming, water\u2026<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"theme-points\" style=\"margin-top:0;\">\n        <div class=\"tp-block\">\n          <div class=\"tp-eyebrow\">Why it pays<\u002Fdiv>\n          <ul>\n            <li><strong>Usage-based<\u002Fstrong> \u2014 paid per prescription, stream or licence, on assets already generating revenue.<\u002Fli>\n            <li><strong>Non-cyclical demand<\u002Fstrong> \u2014 consumption of medicine and music continues through downturns.<\u002Fli>\n            <li><strong>Inflation-aware<\u002Fstrong> \u2014 many royalty contracts rise with prices, helping income keep pace.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"tp-block\">\n          <div class=\"tp-eyebrow\">Why it diversifies<\u002Fdiv>\n          <p class=\"tp-prose\">Because the cash flow is driven by consumption rather than rates or spreads, it has little connection to the credit cycle \u2014 diversification from outside financial markets altogether.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"vehicle-band\">\n      <div class=\"vb-head\">The vehicle \u00b7 what is actually held<\u002Fdiv>\n      <div class=\"vb-grid\">\n        <div class=\"vb-col\"><div class=\"vb-k\">Instruments<\u002Fdiv><div class=\"vb-v\"><strong>Royalty streams and royalty-backed debt<\u002Fstrong> on music catalogues, pharmaceutical products and other intellectual property; diversified across hundreds of underlying assets.<\u002Fdiv><\u002Fdiv>\n        <div class=\"vb-col\"><div class=\"vb-k\">Structure &amp; access<\u002Fdiv><div class=\"vb-v\">Accessed through <strong>specialist royalty funds and securitisations<\u002Fstrong> (e.g. catalogue-backed notes); long-dated cash flows with quarterly investor liquidity.<\u002Fdiv><\u002Fdiv>\n        <div class=\"vb-col\"><div class=\"vb-k\">How we implement<\u002Fdiv><div class=\"vb-v\">External specialists source and value catalogues; Cape diversifies across asset type and vintage and avoids single-catalogue or single-drug concentration.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"theme-takeaway\">Income from the <strong>real economy<\u002Fstrong> \u2014 paid for usage, with little link to the credit or rate cycle.<\u002Fdiv>\n    <div class=\"cite\"><sup>1<\u002Fsup> Sector sizes are a compilation of industry estimates; Partners Group, \"Royalties: A Primer\" (2024). Illustrative explanation of the strategy mechanism; for information only. Not investment advice. Past performance is not a guidance for future performance.<\u002Fdiv>\n      <div class=\"slide-num\">28<\u002Fdiv>\n  \n    <\u002Fdiv>\n  <\u002Fsection>\n<section data-screen-label=\"30 Appendix - Royalty (role)\">\n    <div class=\"slide\">\n      <img class=\"brand-logo\" src=\"650e1331-48cb-4d5e-a620-f88830959227\" alt=\"Cape Capital\">\n\n    <div class=\"header-top\">\n      <div class=\"section-label\">Usage royalties<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"rule-red\"><\u002Fdiv>\n    <h1 class=\"title\">Royalty income \u2014 its role<\u002Fh1>\n    <div class=\"subtitle\"><strong>What it adds.<\u002Fstrong> A genuine diversifier with high income, driven by consumption \u2014 at the cost of less-frequent liquidity.<\u002Fdiv>\n\n    <div class=\"two-col\" style=\"grid-template-columns:0.92fr 1.08fr; align-items:start; gap:32px; margin-top:14px;\">\n      <div>\n        <div style=\"font-family:'PPRadioGrotesk',sans-serif; font-weight:400; text-transform:uppercase; letter-spacing:0.12em; font-size:10.5px; color:#ADB2BA; margin-bottom:10px;\">Where it sits<\u002Fdiv>\n        <svg viewBox=\"0 0 420 320\" style=\"width:100%; height:auto; max-height:210px;\">\n          <rect x=\"230\" y=\"36\" width=\"160\" height=\"120\" fill=\"#4A090A\" fill-opacity=\"0.06\"><\u002Frect>\n          <line x1=\"56\" y1=\"36\" x2=\"56\" y2=\"270\" stroke=\"#C8CBD1\" stroke-width=\"1.2\"><\u002Fline>\n          <line x1=\"56\" y1=\"270\" x2=\"400\" y2=\"270\" stroke=\"#C8CBD1\" stroke-width=\"1.2\"><\u002Fline>\n          <polygon points=\"56,30 52,40 60,40\" fill=\"#4C4F56\"><\u002Fpolygon>\n          <polygon points=\"406,270 396,266 396,274\" fill=\"#4C4F56\"><\u002Fpolygon>\n          <text x=\"34\" y=\"155\" transform=\"rotate(-90 34 155)\" text-anchor=\"middle\" font-family=\"'PPRadioGrotesk',sans-serif\" font-size=\"10.5\" font-weight=\"700\" letter-spacing=\"0.08em\" fill=\"#4C4F56\">INCOME \u2192<\u002Ftext>\n          <text x=\"228\" y=\"298\" text-anchor=\"middle\" font-family=\"'PPRadioGrotesk',sans-serif\" font-size=\"10.5\" font-weight=\"700\" letter-spacing=\"0.08em\" fill=\"#4C4F56\">INDEPENDENCE FROM EQUITIES \u2192<\u002Ftext>\n          <g opacity=\"0.25\">\n            <circle cx=\"250\" cy=\"240\" r=\"6\" fill=\"#ADB2BA\"><\u002Fcircle>\n            <circle cx=\"135\" cy=\"135\" r=\"6\" fill=\"#831011\"><\u002Fcircle>\n            <circle cx=\"150\" cy=\"120\" r=\"6\" fill=\"#4C4F56\"><\u002Fcircle>\n            <circle cx=\"330\" cy=\"120\" r=\"6\" fill=\"#AD2A2B\"><\u002Fcircle>\n            <circle cx=\"360\" cy=\"120\" r=\"6\" fill=\"#AD2A2B\"><\u002Fcircle>\n            <circle cx=\"330\" cy=\"170\" r=\"6\" fill=\"#C85657\"><\u002Fcircle>\n            <circle cx=\"230\" cy=\"175\" r=\"6\" fill=\"#4A090A\"><\u002Fcircle>\n            <circle cx=\"180\" cy=\"205\" r=\"6\" fill=\"#C85657\"><\u002Fcircle>\n          <\u002Fg>\n          <circle cx=\"330\" cy=\"120\" r=\"10\" fill=\"#AD2A2B\"><\u002Fcircle>\n          <circle cx=\"330\" cy=\"120\" r=\"17\" fill=\"none\" stroke=\"#AD2A2B\" stroke-width=\"1.5\" stroke-dasharray=\"3 3\"><\u002Fcircle>\n          <text x=\"330\" y=\"101\" text-anchor=\"middle\" font-family=\"'PPEiko',serif\" font-weight=\"700\" font-size=\"12.5\" fill=\"#AD2A2B\">Royalty<\u002Ftext>\n        <\u002Fsvg>\n        <div style=\"text-align:center; font-family:Arial; font-size:9.5px; font-style:italic; color:#ADB2BA; margin-top:2px;\">High income; usage-driven, largely uncorrelated to markets.<\u002Fdiv>\n        <div style=\"font-family:'PPRadioGrotesk',sans-serif; font-weight:400; text-transform:uppercase; letter-spacing:0.1em; font-size:9.5px; color:#ADB2BA; margin:10px 0 7px;\">Two cash-flow shapes we blend<\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px;\">\n          <div style=\"border-left:3px solid #4A090A; padding-left:11px;\">\n            <div style=\"font-family:'PPEiko',serif; font-size:14px; color:#4A090A;\">Long-term / growing<\u002Fdiv>\n            <div style=\"font-family:Arial; font-size:10.5px; line-height:1.45; color:var(--grey-800);\">Music &amp; IP, sub-surface \u2014 yield <em>plus<\u002Fem> long-dated NAV accretion.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border-left:3px solid #AD2A2B; padding-left:11px;\">\n            <div style=\"font-family:'PPEiko',serif; font-size:14px; color:#AD2A2B;\">Self-liquidating<\u002Fdiv>\n            <div style=\"font-family:Arial; font-size:10.5px; line-height:1.45; color:var(--grey-800);\">Pharma &amp; gas \u2014 higher running yield that amortises over the asset's life.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'PPRadioGrotesk',sans-serif; font-weight:400; text-transform:uppercase; letter-spacing:0.12em; font-size:10.5px; color:#ADB2BA; margin-bottom:12px;\">What helps it, what hurts it<\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:18px;\">\n          <div style=\"border-left:3px solid #C85657; padding-left:12px;\">\n            <div style=\"font-family:'PPRadioGrotesk',sans-serif; font-weight:400; text-transform:uppercase; letter-spacing:0.08em; font-size:9.5px; color:#C85657; margin-bottom:5px;\">Tailwinds<\u002Fdiv>\n            <div style=\"font-family:Arial; font-size:12px; line-height:1.5; color:var(--grey-800);\">Streaming and content-consumption growth; inflation passthrough on contracts.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border-left:3px solid #831011; padding-left:12px;\">\n            <div style=\"font-family:'PPRadioGrotesk',sans-serif; font-weight:400; text-transform:uppercase; letter-spacing:0.08em; font-size:9.5px; color:#831011; margin-bottom:5px;\">Headwinds<\u002Fdiv>\n            <div style=\"font-family:Arial; font-size:12px; line-height:1.5; color:var(--grey-800);\">Regulatory/streaming-rate changes; valuation multiples if rates rise sharply.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"snapshot-card\">\n          <div class=\"sc-head\">Role &amp; terms \u00b7 indicative<\u002Fdiv>\n          <div class=\"sc-row\"><div class=\"sc-k\">Portfolio role<\u002Fdiv><div class=\"sc-v\">High-income real diversifier<\u002Fdiv><\u002Fdiv>\n          <div class=\"sc-row\"><div class=\"sc-k\">Target return<\u002Fdiv><div class=\"sc-v hl\">10\u201311% USD \u00b7 8.5\u20139.5% EUR-hedged<\u002Fdiv><\u002Fdiv>\n          <div class=\"sc-row\"><div class=\"sc-k\">Indicative weight<\u002Fdiv><div class=\"sc-v\">~10%<\u002Fdiv><\u002Fdiv>\n          <div class=\"sc-row\"><div class=\"sc-k\">Liquidity<\u002Fdiv><div class=\"sc-v\">Quarterly<\u002Fdiv><\u002Fdiv>\n          <div class=\"sc-row\"><div class=\"sc-k\">Correlation to equities<\u002Fdiv><div class=\"sc-v\">Very low<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"theme-takeaway\">Its job in the blend: <strong>high income from a non-financial driver<\u002Fstrong> \u2014 one of the lines that pulls the portfolio toward genuine diversification.<\u002Fdiv>\n    <div class=\"cite\">Positioning and figures are indicative and illustrative of construction intent; not measured data, not a guarantee of future diversification. Past performance is not a guidance for future performance.<\u002Fdiv>\n      <div class=\"slide-num\">29<\u002Fdiv>\n  \n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fdeck-stage>\n\n<script src=\"bfc25632-fc4b-4415-9ed5-cf2e590ecfc2\"><\u002Fscript>\n\n<script>\nfunction fitHeads(){\n  document.querySelectorAll('.slide h1.title, .slide .cover-title, .slide.section-divider h1').forEach(function(el){\n    el.style.whiteSpace='nowrap'; el.style.fontSize='';\n    var s=parseFloat(getComputedStyle(el).fontSize), g=0;\n    while(el.scrollWidth>el.clientWidth+1 && s>18 && g<240){ s-=1; el.style.fontSize=s+'px'; g++; }\n  });\n}\nfunction fitBodies(){\n  document.querySelectorAll('section[data-screen-label] > .slide').forEach(function(slide){\n    var c=slide.classList;\n    if(c.contains('cover')||c.contains('section-divider')||c.contains('back-cover')||c.contains('disclaimer')) return;\n    var fit=slide.querySelector(':scope > .fit');\n    if(!fit){\n      fit=document.createElement('div'); fit.className='fit';\n      [].slice.call(slide.children).forEach(function(el){\n        var out = el.classList.contains('brand-logo')||el.classList.contains('slide-num')||el.classList.contains('cite')||el.classList.contains('header-top')||el.classList.contains('rule-red')||el.classList.contains('title')||el.classList.contains('subtitle')||el.classList.contains('concl')||el.classList.contains('note-bar')||el.classList.contains('theme-takeaway');\n        if(!out) fit.appendChild(el);\n      });\n      slide.appendChild(fit);\n    }\n    fit.style.transform='none'; fit.style.width='';\n    var cs=getComputedStyle(slide), sc=1.5;\n    var slideRect=slide.getBoundingClientRect();\n    var fitTop=fit.getBoundingClientRect().top;\n    var limit=slideRect.bottom - parseFloat(cs.paddingBottom)*sc;\n    var bar=slide.querySelector(':scope > .concl, :scope > .note-bar, :scope > .theme-takeaway');\n    if(bar){ limit=bar.getBoundingClientRect().top - 24; }\n    var maxB=fitTop;\n    fit.querySelectorAll('*').forEach(function(el){\n      if(el.offsetParent===null && getComputedStyle(el).position!=='fixed') return;\n      var b=el.getBoundingClientRect().bottom; if(b>maxB) maxB=b;\n    });\n    var need=maxB-fitTop, avail=limit-fitTop;\n    if(need>avail+1 && avail>0){ var k=avail/need; fit.style.transformOrigin='top left'; fit.style.transform='scale('+k+')'; }\n  });\n}\nfunction fitAll(){ fitHeads(); fitBodies(); }\nwindow.addEventListener('load', function(){ setTimeout(fitAll,300); });\ndocument.addEventListener('slidechange', function(){ setTimeout(fitAll,40); });\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
  </script>
